name: Release Truth Gate

on:
  push:
    branches: [main, 001-ai-practice-system]
  pull_request:
    branches: [main, 001-ai-practice-system]
  workflow_dispatch:

jobs:
  release-truth:
    name: release-truth
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node from web/package-lock.json authority
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Set up Python from backend/requirements.txt authority
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            backend/pyproject.toml

      - name: Install repo-root authorities
        run: |
          npm --prefix web ci
          python -m venv backend/venv
          backend/venv/bin/pip install --upgrade pip
          backend/venv/bin/pip install -r backend/requirements.txt

      - name: Web focused gate
        run: |
          npm --prefix web test -- --run "src/app/(auth)/login/page.test.tsx" "src/components/error-reporting.test.tsx"

      - name: Backend auth + metrics + analytics/error gate
        run: |
          backend/venv/bin/python -m pytest -c backend/pyproject.toml backend/tests/integration/test_auth_login_api.py backend/tests/integration/test_observability_surfaces.py -x -q

      - name: Docs/spec drift inventory gate
        run: |
          # docs/api-contract/* is the current contract authority.
          rg -n "/api/v1/practice/sessions|/api/v1/admin/release-verification|/api/v1/support/runtime" docs/api-contract
          # api-spec.md and checked-in openapi.yaml remain explicit legacy/drift surfaces until promoted.
          rg -n "/auth/wechat|POST /api/v1/sessions" api-spec.md specs/001-ai-practice-system/contracts/openapi.yaml
