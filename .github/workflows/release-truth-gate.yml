name: Release Truth Gate

on:
  push:
    branches: [main, 001-ai-practice-system]
  pull_request:
    branches: [main, 001-ai-practice-system]
  workflow_dispatch:

jobs:
  release-truth:
    name: release-truth
    runs-on: ubuntu-latest
    timeout-minutes: 45

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: dev
          POSTGRES_PASSWORD: dev
          POSTGRES_DB: sales_training
        options: >-
          --health-cmd pg_isready -U dev -d sales_training
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      redis:
        image: redis:7
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    env:
      DATABASE_URL: postgresql+asyncpg://dev:dev@127.0.0.1:5432/sales_training
      REDIS_URL: redis://127.0.0.1:6379/0
      NEXT_PUBLIC_API_URL: http://localhost:3444/api/v1
      NEXT_PUBLIC_WS_URL: ws://localhost:3444
      SMOKE_ADMIN_EMAIL: admin@qoder.ai
      SMOKE_ADMIN_PASSWORD: change-me
      AUTH_SHARED_PASSWORD: change-me
      AUTO_START_INFRA: "0"
      PORTS_TO_CLEAN: 3444,3445
      PLAYWRIGHT_SKIP_BROWSER_INSTALL: "1"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node from web/package-lock.json authority
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Set up Python from backend/requirements.txt authority
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            backend/pyproject.toml

      - name: Install repo-root authorities
        run: |
          npm --prefix web ci
          python -m venv backend/venv
          backend/venv/bin/pip install --upgrade pip
          backend/venv/bin/pip install -r backend/requirements.txt

      - name: Install Playwright browser + system dependencies
        run: |
          cd web
          npx playwright install --with-deps chromium

      - name: Critical full-stack quality gate
        run: |
          bash scripts/critical-quality-gate.sh

      - name: Upload T9 quality-gate evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: t9-quality-gate-evidence
          path: |
            .sisyphus/evidence/task-9-quality-gate.txt
            .sisyphus/evidence/task-9-playwright-report.html
            .sisyphus/evidence/task-9-playwright-report/
