name: NFR Performance Metrics Validation

# Constitution Principle II: Real-Time Priority - <300ms end-to-end latency
# Validates NFR metrics before release
# CI/CD Gate: Performance tests must pass

on:
  push:
    branches: [main, 001-ai-practice-system]
  pull_request:
    branches: [main, 001-ai-practice-system]
  workflow_dispatch:
    inputs:
      upload-results:
        description: 'Upload test results to artifacts'
        required: false
        default: 'true'

env:
  PYTHON_VERSION: '3.11'

jobs:
  nfr-performance-validation:
    name: NFR Performance Validation
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: test_db
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python from backend/requirements.txt authority
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: |
            backend/requirements.txt
            backend/pyproject.toml

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y portaudio19-dev python3-pyaudio

      - name: Install backend dependencies from requirements authority
        working-directory: ./backend
        run: |
          python -m venv venv
          venv/bin/pip install --upgrade pip
          venv/bin/pip install -r requirements.txt

      - name: Setup test environment
        working-directory: ./backend
        run: |
          cp .env.example .env
          echo "TESTING=true" >> .env
          echo "DATABASE_URL=postgresql+asyncpg://test_user:test_password@localhost:5432/test_db" >> .env
          echo "SKIP_EXTERNAL_DEPS=true" >> .env

      - name: Wait for PostgreSQL
        run: |
          until pg_isready -h localhost -p 5432; do
            echo "Waiting for PostgreSQL..."
            sleep 2
          done

      - name: Run database migrations (schema authority: Alembic)
        working-directory: ./backend
        run: |
          # CI validates the explicit migration authority line; startup init_db is
          # bootstrap only and must not be treated as schema-evolution authority.
          venv/bin/alembic upgrade head

      - name: Run NFR performance tests
        working-directory: ./backend
        run: |
          mkdir -p test-results
          venv/bin/python -m pytest tests/performance/test_nfr_metrics.py \
            -v \
            --tb=short \
            --no-cov \
            --junitxml=test-results/nfr-performance.xml
        env:
          DATABASE_URL: postgresql+asyncpg://test_user:test_password@localhost:5432/test_db

      - name: Generate NFR performance report
        if: always()
        working-directory: ./backend
        run: |
          venv/bin/python -c "
          import xml.etree.ElementTree as ET
          from pathlib import Path
          from common.monitoring.nfr_reporter import NFRReporter

          result_xml = Path('test-results/nfr-performance.xml')
          reporter = NFRReporter(output_dir='test-results')
          reporter.set_metadata(
            commit_sha='${{ github.sha }}',
            branch='${{ github.ref_name }}',
            environment='ci',
          )

          provider_skips = []
          infra_warnings = []
          external_warnings = []
          if result_xml.exists():
            root = ET.parse(result_xml).getroot()
            for testcase in root.iter('testcase'):
              skipped = testcase.find('skipped')
              if skipped is None:
                continue
              message = skipped.attrib.get('message', '')
              name = testcase.attrib.get('name', 'unknown')
              entry = {'test': name, 'message': message}
              if 'NFR_PROVIDER_UNAVAILABLE' in message:
                provider_skips.append(entry)
              elif 'NFR_INFRA_MISSING' in message:
                infra_warnings.append(entry)
              elif 'NFR_EXTERNAL_UNAVAILABLE' in message:
                external_warnings.append(entry)

          json_path = reporter.generate_json()
          report = json_path.read_text(encoding='utf-8')
          import json
          data = json.loads(report)
          data['skip_classification'] = {
            'provider_unavailable': provider_skips,
            'infra_missing': infra_warnings,
            'external_unavailable': external_warnings,
          }
          json_path.write_text(json.dumps(data, indent=2, ensure_ascii=False), encoding='utf-8')

          print('NFR report generated from pytest results')
          print(f'Report saved to: {json_path}')
          print(f'Provider unavailable skips: {len(provider_skips)}')
          print(f'Infrastructure warnings: {len(infra_warnings)}')
          print(f'External warnings: {len(external_warnings)}')
          "

      - name: Upload NFR test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nfr-performance-results
          path: backend/test-results/
          retention-days: 30

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nfr-coverage-report
          path: backend/htmlcov/
          retention-days: 30

      - name: Comment NFR results on PR
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const reportPath = 'backend/test-results/nfr-report.json';

            if (fs.existsSync(reportPath)) {
              const report = JSON.parse(fs.readFileSync(reportPath, 'utf8'));
              const summary = report.summary || {};
              const skips = report.skip_classification || {};
              const body = `## NFR Performance Test Results

              ### Performance Targets (Constitution Principle II: <300ms)

              | Status | Tested Metrics | Failed Metrics | Provider Skips | Infra Warnings |
              |---------|--------------|--------|--------|--------|
              | ${summary.overall_status || 'UNKNOWN'} | ${summary.total_metrics || 0} | ${summary.failed_metrics || 0} | ${(skips.provider_unavailable || []).length} | ${(skips.infra_missing || []).length} |

              **Commit:** ${(report.metadata || {}).commit_sha || 'unknown'}
              **Branch:** ${(report.metadata || {}).branch || 'unknown'}

              View detailed results in the artifacts.
              `;

              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: body
              });
            }

      - name: Check NFR thresholds
        working-directory: ./backend
        run: |
          venv/bin/python -c "
          import sys
          import json
          from pathlib import Path

          result_file = Path('test-results/nfr-report.json')
          if not result_file.exists():
            print('NFR report not found')
            sys.exit(1)

          report = json.loads(result_file.read_text())
          summary = report.get('summary', {})
          failed_metrics = int(summary.get('failed_metrics') or 0)
          skips = report.get('skip_classification', {})
          print(f'NFR tested metrics: {summary.get(\"total_metrics\", 0)}')
          print(f'NFR failed metrics: {failed_metrics}')
          print(f'NFR provider unavailable skips: {len(skips.get(\"provider_unavailable\", []))}')
          print(f'NFR infrastructure warnings: {len(skips.get(\"infra_missing\", []))}')
          if failed_metrics:
            sys.exit(1)
          "

  load-testing:
    name: Load Testing (50 Concurrent Sessions)
    runs-on: ubuntu-latest
    needs: nfr-performance-validation

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python from backend/requirements.txt authority
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: |
            backend/requirements.txt
            backend/pyproject.toml

      - name: Install dependencies from requirements authority
        working-directory: ./backend
        run: |
          python -m venv venv
          venv/bin/pip install --upgrade pip
          venv/bin/pip install -r requirements.txt
          venv/bin/pip install locust

      - name: Run load test
        working-directory: ./backend
        run: |
          venv/bin/python -m pytest tests/performance/ \
            -k "concurrent" \
            -v \
            --junitxml=test-results/load-test.xml
        env:
          LOAD_TEST_USERS: 50
          LOAD_TEST_DURATION: 60

      - name: Upload load test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: load-test-results
          path: backend/test-results/
          retention-days: 30
